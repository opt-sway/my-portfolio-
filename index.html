<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azer Rached | Expert Marketing & Croissance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0a0f;
            --secondary: #141420;
            --accent: #00d4ff;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --text-light: #e8e8f0;
            --text-muted: #a0a0b8;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(8deg); }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); }
            50% { box-shadow: 0 0 60px rgba(0, 212, 255, 0.8); }
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes wave-anim {
            0%, 100% { height: 12px; }
            50% { height: 30px; }
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Background Animation */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: float 25s ease-in-out infinite;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            top: -10%;
            left: -10%;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--purple) 0%, transparent 70%);
            top: 50%;
            right: -10%;
            animation-delay: 8s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
            bottom: -10%;
            left: 30%;
            animation-delay: 15s;
        }

        /* Audio Player */
        .audio-player {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
            background: rgba(20, 20, 32, 0.95);
            backdrop-filter: blur(30px);
            padding: 20px 30px;
            border-radius: 60px;
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 50px rgba(0, 212, 255, 0.4);
            animation: pulse-glow 3s ease-in-out infinite;
            cursor: pointer;
            transition: all 0.3s;
        }

        .audio-player:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 60px rgba(0, 212, 255, 0.6);
        }

        .audio-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .audio-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .audio-title {
            color: var(--accent);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .audio-subtitle {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .audio-waves {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 30px;
        }

        .wave {
            width: 4px;
            background: linear-gradient(180deg, var(--accent), var(--purple));
            border-radius: 2px;
            animation: wave-anim 0.8s ease-in-out infinite;
        }

        .wave:nth-child(1) { animation-delay: 0s; }
        .wave:nth-child(2) { animation-delay: 0.2s; }
        .wave:nth-child(3) { animation-delay: 0.4s; }

        .audio-waves.paused .wave {
            animation: none;
            height: 12px;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            z-index: 9999;
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        nav .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--purple), var(--pink));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 3s ease infinite;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 2rem 4rem;
        }

        .hero {
            text-align: center;
            max-width: 1200px;
        }

        h1 {
            font-size: 5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff, var(--accent), var(--purple));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 4s ease infinite;
            font-weight: 900;
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
        }

        .cta-button {
            display: inline-block;
            padding: 1.2rem 3rem;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.4);
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(0, 212, 255, 0.6);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }

            nav ul {
                display: none;
            }

            .audio-player {
                padding: 15px 20px;
                bottom: 20px;
                right: 20px;
            }

            .audio-info {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Audio Player -->
    <div class="audio-player" id="audioPlayer">
        <button class="audio-btn" id="playBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                <polygon id="playIcon" points="5 3 19 12 5 21 5 3"></polygon>
                <rect id="pauseIcon1" x="6" y="4" width="4" height="16" style="display:none;"></rect>
                <rect id="pauseIcon2" x="14" y="4" width="4" height="16" style="display:none;"></rect>
            </svg>
        </button>
        <div class="audio-info">
            <div class="audio-title">🎙️ Ma présentation</div>
            <div class="audio-subtitle">Cliquez pour écouter</div>
        </div>
        <div class="audio-waves paused" id="audioWaves">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
        </div>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="myAudio" loop preload="auto">
        <source src="voiceover.mp3" type="audio/mpeg">
    </audio>

    <!-- Navigation -->
    <nav>
        <div class="container">
            <div class="logo">AZER RACHED</div>
            <ul>
                <li><a href="#about">À Propos</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="content">
        <div class="hero">
            <h1>AZER RACHED</h1>
            <p class="subtitle">Expert Marketing & Croissance | Disponible en Alternance</p>
            <a href="mailto:azerrached3@gmail.com" class="cta-button">Travaillons Ensemble</a>
        </div>
    </div>

    <script>
        // Audio Player Implementation
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioWaves = document.getElementById('audioWaves');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon1 = document.getElementById('pauseIcon1');
        const pauseIcon2 = document.getElementById('pauseIcon2');
        
        let isPlaying = false;
        let hasInteracted = false;
        
        // Set volume
        audio.volume = 0.6;
        
        // Update UI
        function updateUI() {
            if (isPlaying) {
                playIcon.style.display = 'none';
                pauseIcon1.style.display = 'block';
                pauseIcon2.style.display = 'block';
                audioWaves.classList.remove('paused');
            } else {
                playIcon.style.display = 'block';
                pauseIcon1.style.display = 'none';
                pauseIcon2.style.display = 'none';
                audioWaves.classList.add('paused');
            }
        }
        
        // Play audio
        function playAudio() {
            audio.play().then(() => {
                isPlaying = true;
                updateUI();
                console.log('✅ Audio playing');
            }).catch(err => {
                console.log('⚠️ Autoplay blocked:', err.message);
                isPlaying = false;
                updateUI();
            });
        }
        
        // Pause audio
        function pauseAudio() {
            audio.pause();
            isPlaying = false;
            updateUI();
        }
        
        // Toggle play/pause
        function toggleAudio() {
            if (isPlaying) {
                pauseAudio();
            } else {
                playAudio();
            }
        }
        
        // Button click
        playBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            hasInteracted = true;
            toggleAudio();
        });
        
        // Player click
        audioPlayer.addEventListener('click', () => {
            hasInteracted = true;
            toggleAudio();
        });
        
        // Universal interaction handler
        function handleInteraction() {
            if (!hasInteracted && !isPlaying) {
                hasInteracted = true;
                playAudio();
            }
        }
        
        // Listen to all interaction events
        ['click', 'touchstart', 'touchend', 'mousedown', 'keydown', 'scroll'].forEach(event => {
            document.addEventListener(event, handleInteraction, { once: true, passive: true });
        });
        
        // Try autoplay on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (!hasInteracted) playAudio();
            }, 500);
        });
        
        // Try immediate autoplay
        setTimeout(() => {
            if (!hasInteracted) playAudio();
        }, 300);
        
        // Audio events
        audio.addEventListener('play', () => {
            isPlaying = true;
            updateUI();
        });
        
        audio.addEventListener('pause', () => {
            isPlaying = false;
            updateUI();
        });
        
        audio.addEventListener('error', (e) => {
            console.error('❌ Audio error:', e);
        });
        
        audio.addEventListener('loadeddata', () => {
            console.log('✅ Audio loaded');
        });
        
        // Mobile detection
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) {
            console.log('📱 Mobile device detected');
        }
        
        console.log('🎵 Audio system ready');
    </script>
</body>
</html>
